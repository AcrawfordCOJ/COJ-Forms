<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COJ Events — Forms</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500;600&display=swap');
  :root {
    --orange:#F47D30; --charcoal:#4A4A4A; --linen:#F2EDE6; --terra:#7A3A18;
    --font-display:'Cormorant Garamond',Georgia,serif;
    --font-body:'Jost','Century Gothic',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#EAE5DE;font-family:var(--font-body);color:var(--charcoal);padding:64px 24px;}
  .page{background:#FAFAFA;width:100%;max-width:720px;margin:0 auto;box-shadow:0 2px 24px rgba(0,0,0,0.10);}
  .header{background:var(--linen);border-bottom:3px solid var(--orange);padding:36px 48px;text-align:center;}
  .eyebrow{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--orange);margin-bottom:8px;}
  .title{font-family:var(--font-display);font-size:36px;font-weight:300;color:var(--charcoal);}
  .list{padding:36px 48px 48px;}
  .card{display:flex;align-items:center;justify-content:space-between;background:#FAF7F2;border:1px solid #E5DDD6;border-radius:2px;padding:20px 24px;margin-bottom:16px;text-decoration:none;transition:border-color 0.2s;}
  .card:hover{border-color:var(--orange);}
  .card-title{font-family:var(--font-display);font-size:22px;font-weight:300;color:var(--charcoal);margin-bottom:4px;}
  .card-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--terra);}
  .arrow{font-size:20px;color:var(--orange);}
  .footer{text-align:center;padding:24px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(74,74,74,0.4);}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="eyebrow">COJ Events</div>
    <div class="title">Client &amp; Vendor Forms</div>
  </div>
  <div class="list">
    <a class="card" href="hair-makeup/">
      <div>
        <div class="card-title">Hair &amp; Makeup Services</div>
        <div class="card-sub">Getting ready guide</div>
      </div>
      <div class="arrow">&#8594;</div>
    </a>
    <a class="card" href="ceremony-seating/">
      <div>
        <div class="card-title">Ceremony Seating</div>
        <div class="card-sub">Seating chart form</div>
      </div>
      <div class="arrow">&#8594;</div>
    </a>
    <a class="card" href="food-beverage/">
      <div>
        <div class="card-title">Food &amp; Beverage Tasting</div>
        <div class="card-sub">Tasting notes form</div>
      </div>
      <div class="arrow">&#8594;</div>
    </a>
  </div>
</div>
<div class="footer">COJ Events &middot; cojevents.com</div>
</body>
</html>
